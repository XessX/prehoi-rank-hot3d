dataset_name: HOT3D
dataset_root: data/raw/hot3d
root_dir: data/raw/hot3d
annotation_dir: data/raw/hot3d/annotations
split_file: data/processed/hot3d_splits.json
index_path: data/processed/hot3d_sample_index.json
index_file: data/processed/hot3d_sample_index.json
rebuild_index: false
use_official_toolkit: false
data_format: unknown # vrs, webdataset, or unknown

# Keep true for the MVP. Set false only after implementing the real parser.
synthetic_mode: true
use_synthetic: true
synthetic_num_samples: 64
synthetic_seed: 123

observation_frames: 16
forecast_horizon: 5
seq_len: 16
feature_dim: 128
image_size: 32
future_steps: 5
num_hand_joints: 21
num_objects: 33
num_actions: 8

frame_extensions:
  - .jpg
  - .jpeg
  - .png
  - .bmp

annotation_candidates:
  - annotations.json
  - annotation.json
  - sequence.json
  - metadata.json
  - events.json
  - frames.json

# Real-mode safety switches. Missing labels/targets are not fabricated.
load_frames: false
allow_placeholder_features: false
require_object_id: true
require_action_label: true
require_hand_pose: true
require_future_hand_pose: true

precontact:
  input_frames: 16
  forecast_horizon: 5
  contact_definition: "TODO: HOT3D does not directly provide action/contact-event labels for our forecasting task; derive and document a proxy only after validating hand/object pose timestamps."

hot3d_integration_todos:
  - "Full HOT3D VRS sequences use metadata.json, recording.vrs, dynamic_objects.csv, headset_trajectory.csv, mano_hand_pose_trajectory.jsonl, optional umetrack_hand_pose_trajectory.jsonl, box2d files, masks, and Aria MPS/Quest camera metadata."
  - "HOT3D-Clips use tar/WebDataset-style clips with <FRAME-ID>.image_<STREAM-ID>.jpg, cameras.json, hands.json, objects.json, info.json, optional __hand_shapes.json__, clip_definitions.json, and clip_splits.json."
  - "Use official Hot3dDataProvider and projectaria_tools/vrs for image streams, calibration, timestamp lookup, MANO/UmeTrack hand providers, object pose providers, object library, and gaze/MPS data."
  - "Map object_uid / instance_bop_id to stable target-object class IDs using the object library or clip object model metadata."
  - "Define pre-contact windows from validated timestamp_ns sequences, ending before a documented contact or closest-approach proxy."
  - "Convert MANO/UmeTrack hand representations to Tensor[observation_frames, num_hand_joints, 3] with the official provider or hand_tracking_toolkit."
  - "Construct future hand-pose targets at timestamp t + forecast_horizon frames or equivalent timestamp offset."
  - "Add action labels only from a documented taxonomy or external annotation source; do not infer actions silently."
  - "Add contact/affordance labels only from real contact labels or a defensible documented proxy."

action_taxonomy:
  - pick
  - grasp
  - rotate
  - place
  - pour
  - push
  - handover
  - other
